<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TrafficLens{% endblock %}</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body { margin: 0; font-family: system-ui, Arial, sans-serif; }
    .app { display: flex; height: 100vh; }

    .sidebar {
      width: 260px;
      background: #0f172a;
      color: white;
      padding: 16px;
      box-sizing: border-box;
    }

    .sidebar h2 { margin: 0 0 16px; font-size: 18px; }

    .nav a {
      display: block;
      color: #cbd5e1;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .nav a:hover { background: rgba(255,255,255,0.08); color: white; }

    .content {
      flex: 1;
      background: #0b1020;
      color: white;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: min(420px, 100%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 28px;
    }

    .card h1 { margin-top: 0; font-size: 24px; }

    .messages { list-style: none; padding: 0; margin: 0 0 16px; }
    .messages li { margin: 8px 0; padding: 10px 12px; border-radius: 8px; }
    .messages li.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.35); }
    .messages li.error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.35); }

    .field { margin-bottom: 14px; }
    .field label { display: block; margin-bottom: 5px; color: #cbd5e1; font-size: 13px; font-weight: 500; }
    .field-error { color: #f87171; font-size: 12px; margin: 4px 0 0; }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: white;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #2563eb;
    }

    button[type="submit"] {
      display: block;
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: 0;
      background: #2563eb;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: filter 0.15s;
    }

    button[type="submit"]:hover { filter: brightness(1.1); }

    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .muted { color: #94a3b8; font-size: 14px; }

    .btn-guest {
      display: inline-block;
      color: #64748b;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      padding: 8px 16px;
      margin-top: 12px;
      width: 100%;
      text-align: center;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-guest:hover {
      color: #cbd5e1;
      border-color: rgba(255,255,255,0.25);
      text-decoration: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 12px;
      color: #475569;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.10);
    }
    @media (max-width: 640px) {
      .app { flex-direction: column; height: auto; min-height: 100vh; }
      .sidebar { width: 100%; flex-direction: row; align-items: center; padding: 12px 16px; }
      .sidebar h2 { margin: 0; font-size: 16px; }
      .nav { display: flex; gap: 4px; margin-left: 16px; }
      .nav a { padding: 6px 10px; margin: 0; }
      .content { padding: 20px 16px; align-items: flex-start; }
      .card { padding: 20px; border-radius: 12px; }
    }
    {% block extra_style %}{% endblock %}
  </style>
</head>

<body>
<div class="app">

  <aside class="sidebar">
    <h2>TrafficLens</h2>
    <div class="nav">
      <a href="{% url 'login' %}">Login</a>
      <a href="{% url 'register' %}">Register</a>
    </div>
  </aside>

  <main class="content">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>
</body>
</html>
